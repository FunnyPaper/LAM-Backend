syntax = "proto3";

import "google/protobuf/struct.proto";

package worker;

message StartJobRequest {
    string jobId = 1;
    google.protobuf.Struct script = 2;
    google.protobuf.Struct env = 3;
}

message CancelJobRequest {
    string jobId = 1;
}

message CancelJobResponse {
    bool success = 1;
}

enum JobEventType {
    UNKNOWN_JOB_EVENT_TYPE = 0;
    STATUS_CHANGE = 1;
    RESULT_UPDATE = 2;
    LOG = 3;
}

enum JobStatus {
    UNKNOWN_JOB_STATUS = 0;
    STARTED = 1;
    RUNNING = 2;
    COMPLETED = 3;
    CANCELLED = 4;
    FAILED = 5;
    CANCELLING = 6;
}

enum LogType {
    UNKNOWN_LOG_TYPE = 0;
    INFO = 1;
    WARN = 2;
    ERROR = 3;
}

message LogEvent {
    LogType type = 1;
    string message = 2;
}

message JobEvent {
    string jobId = 1;
    JobEventType type = 2;
    oneof event {
        JobStatus status = 3;
        LogEvent log = 4;
        StatusEvent payload = 5;
    }
}

enum StatusType {
    UNKNOWN_STATUS_TYPE = 0;
    PARTIAL = 1;
    FULL = 2;
}

message StatusEvent {
    StatusType type = 1;
    repeated google.protobuf.Struct data = 2;
}

message GetScriptValidationSchemaRequest {
    string version = 1;
}

service WorkerService {
    rpc StartJob (StartJobRequest) returns (stream JobEvent);
    rpc CancelJob (CancelJobRequest) returns (CancelJobResponse);
    rpc GetScriptValidationSchema (GetScriptValidationSchemaRequest) returns (google.protobuf.Struct);
}
